spring:
  datasource:
    url: jdbc:h2:mem:openbootcamp-test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
    show-sql: false
app:
  cors:
    allowed-origins: http://localhost:3000
  frontend-url: http://localhost:3000
  jwt:
    secret: 1q2w3e4r!!or@@
    access-token-expiry: 900000       # 15분 (ms)
    refresh-token-expiry: 604800000   # 7일 (ms)
logging:
  level:
    hyeonzip.openbootcamp: DEBUG
    org.hibernate.SQL: DEBUG
