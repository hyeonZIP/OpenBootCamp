spring:
  datasource:
    url: jdbc:h2:mem:openbootcamp;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    properties:
      hibernate:
        format_sql: true
        default_batch_fetch_size: 100
    show-sql: false

app:
  cors:
    allowed-origins: http://localhost:3000
  frontend-url: http://localhost:3000
  jwt:
    secret: ${JWT_SECRET:local-dev-secret-key-minimum-32-characters}
    access-token-expiry: 900000       # 15분 (ms)
    refresh-token-expiry: 604800000   # 7일 (ms)
# ── 로깅 ─────────────────────────────────────────────────────────
logging:
  level:
    hyeonzip.openbootcamp: DEBUG
    org.hibernate.SQL: DEBUG
