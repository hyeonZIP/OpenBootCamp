spring:
  application:
    name: OpenBootCamp

  datasource:
    url: jdbc:h2:mem:openbootcamp;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

# ── 앱 커스텀 설정 (Phase 2에서 활성화) ─────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET:local-dev-secret-key-minimum-32-characters}
    access-token-expiry: 900000       # 15분 (ms)
    refresh-token-expiry: 604800000   # 7일 (ms)
  github:
    client-id: ${GITHUB_CLIENT_ID:}
    client-secret: ${GITHUB_CLIENT_SECRET:}
    token: ${GITHUB_TOKEN:}           # Rate Limit용 PAT

# ── 로깅 ─────────────────────────────────────────────────────────
logging:
  level:
    hyeonzip.openbootcamp: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE  # Hibernate 7.x 파라미터 바인딩
