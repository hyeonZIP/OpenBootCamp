openapi: 3.0.3
info:
  title: OpenBootCamp API
  description: 부트캠프 정보 조회 및 관리 API
  version: 1.0.0

servers:
  - url: http://localhost:8080/api/v1
    description: Local Development Server

tags:
  - name: Health
    description: 헬스 체크
  - name: Bootcamp
    description: 부트캠프 CRUD
  - name: BootcampTrack
    description: 부트캠프 트랙 관리

paths:
  /health:
    get:
      tags:
        - Health
      summary: 헬스 체크
      operationId: health
      responses:
        '200':
          description: 서버 정상 동작
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseString'
              example:
                success: true
                data: healthy

  /bootcamps:
    get:
      tags:
        - Bootcamp
      summary: 부트캠프 목록 조회
      description: 필터 및 페이지네이션으로 부트캠프 목록을 조회합니다.
      operationId: getBootcamps
      parameters:
        - name: trackType
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/TrackType'
        - name: operationType
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/OperationType'
        - name: techStack
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/TechStack'
        - name: keyword
          in: query
          required: false
          description: 부트캠프 이름 검색 키워드
          schema:
            type: string
        - name: page
          in: query
          required: false
          description: 페이지 번호 (0부터 시작)
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          required: false
          description: 페이지 크기
          schema:
            type: integer
            default: 20
        - name: sort
          in: query
          required: false
          description: "정렬 기준 (예: createdAt,desc)"
          schema:
            type: string
            default: createdAt,desc
      responses:
        '200':
          description: 부트캠프 목록 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponsePageBootcampResponse'

    post:
      tags:
        - Bootcamp
      summary: 부트캠프 등록
      operationId: createBootcamp
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BootcampRequest'
      responses:
        '201':
          description: 부트캠프 등록 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseBootcampResponse'
        '400':
          description: 유효하지 않은 요청
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
              example:
                success: false
                message: 부트캠프 이름은 필수입니다.
                errorCode: INVALID_INPUT
        '409':
          description: 슬러그 중복
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
              example:
                success: false
                message: 이미 사용 중인 부트캠프 슬러그입니다.
                errorCode: BOOTCAMP_SLUG_DUPLICATE

  /bootcamps/{id}:
    get:
      tags:
        - Bootcamp
      summary: 부트캠프 단건 조회
      operationId: getBootcamp
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: 부트캠프 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseBootcampResponse'
        '404':
          description: 부트캠프 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
              example:
                success: false
                message: 존재하지 않는 부트캠프입니다.
                errorCode: BOOTCAMP_NOT_FOUND

    put:
      tags:
        - Bootcamp
      summary: 부트캠프 수정
      operationId: updateBootcamp
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BootcampRequest'
      responses:
        '200':
          description: 부트캠프 수정 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseBootcampResponse'
        '400':
          description: 유효하지 않은 요청
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
        '404':
          description: 부트캠프 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
              example:
                success: false
                message: 존재하지 않는 부트캠프입니다.
                errorCode: BOOTCAMP_NOT_FOUND

    delete:
      tags:
        - Bootcamp
      summary: 부트캠프 삭제
      operationId: deleteBootcamp
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: 부트캠프 삭제 성공
        '404':
          description: 부트캠프 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
              example:
                success: false
                message: 존재하지 않는 부트캠프입니다.
                errorCode: BOOTCAMP_NOT_FOUND

  /bootcamps/{id}/tracks:
    post:
      tags:
        - BootcampTrack
      summary: 트랙 추가
      operationId: addTrack
      parameters:
        - name: id
          in: path
          required: true
          description: 부트캠프 ID
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BootcampTrackRequest'
      responses:
        '201':
          description: 트랙 추가 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseBootcampTrackResponse'
        '400':
          description: 유효하지 않은 요청
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
        '404':
          description: 부트캠프 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
              example:
                success: false
                message: 존재하지 않는 부트캠프입니다.
                errorCode: BOOTCAMP_NOT_FOUND

  /bootcamps/{id}/tracks/{trackId}:
    put:
      tags:
        - BootcampTrack
      summary: 트랙 수정
      operationId: updateTrack
      parameters:
        - name: id
          in: path
          required: true
          description: 부트캠프 ID
          schema:
            type: integer
            format: int64
        - name: trackId
          in: path
          required: true
          description: 트랙 ID
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BootcampTrackRequest'
      responses:
        '200':
          description: 트랙 수정 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseBootcampTrackResponse'
        '400':
          description: 유효하지 않은 요청
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
        '404':
          description: 부트캠프 또는 트랙 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'

    delete:
      tags:
        - BootcampTrack
      summary: 트랙 삭제
      operationId: deleteTrack
      parameters:
        - name: id
          in: path
          required: true
          description: 부트캠프 ID
          schema:
            type: integer
            format: int64
        - name: trackId
          in: path
          required: true
          description: 트랙 ID
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: 트랙 삭제 성공
        '404':
          description: 부트캠프 또는 트랙 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'

components:
  schemas:

    # ── Enums ──────────────────────────────────────────────────────
    TrackType:
      type: string
      enum:
        - BACKEND
        - FRONTEND
        - FULLSTACK
        - MOBILE
        - DATA
        - DEVOPS
        - AI_ML
        - SECURITY
        - GAME

    OperationType:
      type: string
      enum:
        - ONLINE
        - OFFLINE
        - HYBRID

    TechStack:
      type: string
      enum:
        - JAVA
        - KOTLIN
        - PYTHON
        - NODE_JS
        - GO
        - RUBY
        - SPRING_BOOT
        - DJANGO
        - FLASK
        - FASTAPI
        - EXPRESS
        - NEST_JS
        - JAVASCRIPT
        - TYPESCRIPT
        - REACT
        - NEXT_JS
        - VUE
        - NUXT_JS
        - ANGULAR
        - SVELTE
        - ANDROID
        - IOS
        - REACT_NATIVE
        - FLUTTER
        - MYSQL
        - POSTGRESQL
        - MONGODB
        - REDIS
        - SQLITE
        - ORACLE
        - DOCKER
        - KUBERNETES
        - AWS
        - GCP
        - AZURE
        - CI_CD
        - LINUX
        - NGINX
        - PYTORCH
        - TENSORFLOW
        - SCIKIT_LEARN
        - PANDAS
        - SPARK
        - GRAPHQL
        - REST_API
        - WEBSOCKET
        - KAFKA
        - ELASTICSEARCH

    # ── Requests ───────────────────────────────────────────────────
    BootcampRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: 부트캠프 이름 (필수, 고유값)
        logoUrl:
          type: string
          description: 로고 이미지 URL
          nullable: true
        description:
          type: string
          description: 부트캠프 소개 (최대 500자)
          maxLength: 500
          nullable: true
        officialUrl:
          type: string
          description: 공식 홈페이지 URL
          nullable: true
        tracks:
          type: array
          items:
            $ref: '#/components/schemas/BootcampTrackRequest'
          nullable: true

    BootcampTrackRequest:
      type: object
      required:
        - trackType
        - operationType
      properties:
        trackType:
          $ref: '#/components/schemas/TrackType'
        operationType:
          $ref: '#/components/schemas/OperationType'
        techStacks:
          type: array
          items:
            $ref: '#/components/schemas/TechStack'
          nullable: true
        priceMin:
          type: integer
          description: 최소 수강료 (원)
          nullable: true
        priceMax:
          type: integer
          description: 최대 수강료 (원)
          nullable: true
        durationWeeks:
          type: integer
          description: 교육 기간 (주)
          nullable: true
        isRecruiting:
          type: boolean
          description: 현재 모집 중 여부
          nullable: true

    # ── Responses ──────────────────────────────────────────────────
    BootcampResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: 부트캠프 ID
        name:
          type: string
          description: 부트캠프 이름
        slug:
          type: string
          description: URL 슬러그 (고유값)
        logoUrl:
          type: string
          description: 로고 이미지 URL
          nullable: true
        description:
          type: string
          description: 부트캠프 소개
          nullable: true
        officialUrl:
          type: string
          description: 공식 홈페이지 URL
          nullable: true
        tracks:
          type: array
          items:
            $ref: '#/components/schemas/BootcampTrackResponse'
        createdAt:
          type: string
          format: date-time
          description: 생성 일시
        updatedAt:
          type: string
          format: date-time
          description: 수정 일시

    BootcampTrackResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: 트랙 ID
        trackType:
          $ref: '#/components/schemas/TrackType'
        operationType:
          $ref: '#/components/schemas/OperationType'
        techStacks:
          type: array
          items:
            $ref: '#/components/schemas/TechStack'
        priceMin:
          type: integer
          description: 최소 수강료 (원)
          nullable: true
        priceMax:
          type: integer
          description: 최대 수강료 (원)
          nullable: true
        durationWeeks:
          type: integer
          description: 교육 기간 (주)
          nullable: true
        isRecruiting:
          type: boolean
          description: 현재 모집 중 여부
          nullable: true
        createdAt:
          type: string
          format: date-time
          description: 생성 일시
        updatedAt:
          type: string
          format: date-time
          description: 수정 일시

    # ── Pagination ─────────────────────────────────────────────────
    PageBootcampResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/BootcampResponse'
        page:
          type: object
          properties:
            size:
              type: integer
              description: 페이지 크기
            number:
              type: integer
              description: 현재 페이지 번호 (0부터 시작)
            totalElements:
              type: integer
              format: int64
            totalPages:
              type: integer

    # ── ApiResponse wrappers ────────────────────────────────────────
    ApiResponseString:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: string

    ApiResponseBootcampResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/BootcampResponse'

    ApiResponsePageBootcampResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/PageBootcampResponse'

    ApiResponseBootcampTrackResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/BootcampTrackResponse'

    ApiResponseError:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          description: 에러 메시지
        errorCode:
          type: string
          description: 에러 코드
          enum:
            - INVALID_INPUT
            - RESOURCE_NOT_FOUND
            - UNAUTHORIZED
            - FORBIDDEN
            - INTERNAL_SERVER_ERROR
            - BOOTCAMP_NOT_FOUND
            - BOOTCAMP_SLUG_DUPLICATE
            - PROJECT_NOT_FOUND
            - PROJECT_UNAUTHORIZED
            - GITHUB_API_ERROR
            - GITHUB_REPO_NOT_FOUND
            - REVIEW_NOT_FOUND
            - REVIEW_DUPLICATE
            - REVIEW_UNAUTHORIZED
